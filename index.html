<html lang="th">

    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef3f5;
      --text: #1f2933;
      --muted: #64707d;
      --line: #d9e1e6;
      --brand: #0f766e;
      --brand-2: #2563eb;
      --warn: #b7791f;
      --danger: #b91c1c;
      --ok: #15803d;
      --ink: #263238;
      --shadow: 0 12px 28px rgba(18, 38, 63, .08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 7px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    button:hover { border-color: #9aa8b4; }
    button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    button.blue { background: var(--brand-2); color: #fff; border-color: var(--brand-2); }
    button.danger { background: #fff5f5; color: var(--danger); border-color: #fecaca; }
    button.ghost { background: transparent; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 8px 10px;
      outline: none;
    }

    textarea { min-height: 84px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15, 118, 110, .12); }

    .app {
      display: grid;
      grid-template-columns: 252px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #17242d;
      color: #e8eef2;
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      padding: 6px 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      margin-bottom: 14px;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.28;
      font-weight: 700;
    }

    .brand p {
      margin: 8px 0 0;
      color: #aebbc5;
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 5px;
    }

    .nav button {
      justify-content: flex-start;
      width: 100%;
      border: 0;
      background: transparent;
      color: #dce6eb;
      padding: 10px 9px;
      border-radius: 7px;
    }

    .nav button:hover { background: rgba(255,255,255,.08); }
    .nav button.active { background: #0f766e; color: #fff; }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 13px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .identity {
      display: grid;
      grid-template-columns: minmax(160px, 220px) minmax(150px, 190px);
      gap: 10px;
      align-items: end;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      align-items: end;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .toolbar .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .cols-2 { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-head {
      padding: 14px 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .panel-body { padding: 15px; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      min-height: 96px;
      display: grid;
      align-content: space-between;
      box-shadow: var(--shadow);
    }

    .kpi span { color: var(--muted); font-size: 13px; }
    .kpi strong { font-size: 28px; line-height: 1.1; }
    .kpi small { color: var(--muted); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field label {
      font-size: 13px;
      color: #43515d;
      font-weight: 600;
    }

    .span-2 { grid-column: 1 / -1; }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f0f4f6;
      color: #384653;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td { border-bottom: 0; }

    .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: #344450;
      font-size: 12px;
      font-weight: 600;
    }

    .badge.ok { background: #dcfce7; color: #166534; }
    .badge.warn { background: #fef3c7; color: #92400e; }
    .badge.danger { background: #fee2e2; color: #991b1b; }
    .badge.blue { background: #dbeafe; color: #1d4ed8; }

    .months {
      display: grid;
      grid-template-columns: repeat(6, minmax(62px, 1fr));
      gap: 8px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px;
      background: #fff;
      min-height: 36px;
    }

    .check input {
      width: 16px;
      min-height: 16px;
      padding: 0;
    }

    .bars {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 170px 1fr 70px;
      gap: 10px;
      align-items: center;
    }

    .bar-track {
      height: 18px;
      background: #edf2f7;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--brand-2);
      min-width: 2px;
    }

    .heatmap {
      display: grid;
      grid-template-columns: 120px repeat(12, minmax(52px, 1fr));
      gap: 6px;
      align-items: stretch;
      overflow: auto;
    }

    .heat-cell, .heat-head, .heat-label {
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 38px;
      padding: 7px;
      display: grid;
      place-items: center;
      font-size: 12px;
      background: #fff;
    }

    .heat-head, .heat-label {
      background: #f0f4f6;
      color: #43515d;
      font-weight: 700;
    }

    .heat-cell[data-level="1"] { background: #dff7ed; }
    .heat-cell[data-level="2"] { background: #b7e4d9; }
    .heat-cell[data-level="3"] { background: #fef3c7; }
    .heat-cell[data-level="4"] { background: #fecaca; }

    .org-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
    }

    .tree {
      overflow: auto;
      padding: 10px;
      min-height: 500px;
    }

    .tree ul {
      list-style: none;
      margin: 0;
      padding-left: 28px;
      position: relative;
    }

    .tree li {
      position: relative;
      padding: 8px 0 8px 18px;
    }

    .tree li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 24px;
      width: 16px;
      border-top: 1px solid #b8c5ce;
    }

    .node {
      display: inline-grid;
      gap: 5px;
      min-width: 240px;
      max-width: 340px;
      border: 1px solid var(--line);
      background: #fff;
      border-left: 5px solid var(--brand);
      border-radius: var(--radius);
      padding: 10px;
      box-shadow: 0 8px 18px rgba(18, 38, 63, .08);
      cursor: pointer;
    }

    .node:hover { border-color: #9aa8b4; }
    .node.selected { outline: 3px solid rgba(37, 99, 235, .18); }
    .node strong { font-size: 14px; }
    .node small { color: var(--muted); }

    .drawer {
      border-left: 4px solid var(--brand-2);
      background: #fff;
      border-radius: var(--radius);
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 500px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tabs button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .stepper {
      display: grid;
      gap: 12px;
    }

    details {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    summary {
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #f0f4f6;
    }

    details .inside { padding: 14px; }

    .notice {
      border: 1px solid #b7e4d9;
      background: #effcf7;
      color: #134e4a;
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    .status-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .topbar { grid-template-columns: 1fr; }
      .identity, .toolbar, .kpis, .cols-2, .cols-3, .cols-4, .org-layout { grid-template-columns: 1fr; }
      .content { padding: 14px; }
      .months { grid-template-columns: repeat(3, minmax(62px, 1fr)); }
    }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .span-2 { grid-column: auto; }
      .nav { grid-template-columns: 1fr 1fr; }
      .months { grid-template-columns: repeat(2, minmax(62px, 1fr)); }
      .bar-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

    let state = loadState();
    let currentTab = "dashboard";
    let editing = { org: null, position: null, person: null, duty: null };
    let selectedOrgId = state.orgs[0]?.id || "";
    let collapsedOrgs = new Set();

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(seed);
      try {
        const data = JSON.parse(raw);
        return { ...structuredClone(seed), ...data, settings: { ...seed.settings, ...(data.settings || {}) } };
      } catch {
        return structuredClone(seed);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function uid(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function nowIso() { return new Date().toISOString(); }

    function logChange(tableName, recordId, actionType, oldValue, newValue, reason = "") {
      state.auditLogs.unshift({
        id: uid("log"),
        tableName,
        recordId,
        actionType,
        oldValue: JSON.stringify(oldValue || ""),
        newValue: JSON.stringify(newValue || ""),
        changedBy: roleLabel(state.settings.role),
        changedAt: nowIso(),
        reason,
        ipAddress: "local",
        deviceInfo: navigator.userAgent.slice(0, 80)
      });
    }

    function roleLabel(role) {
      return (roles.find(([id]) => id === role) || roles[0])[1];
    }

    function orgName(id) {
      if (!id) return "-";
      return (state.orgs.find(o => o.id === id) || {}).name || "-";
    }

    function positionName(id) {
      if (!id) return "-";
      return (state.positions.find(p => p.id === id) || {}).name || "-";
    }

    function personName(id) {
      if (!id) return "-";
      return (state.persons.find(p => p.id === id) || {}).name || "-";
    }

    function formatNumber(value, digits = 2) {
      return Number(value || 0).toLocaleString("th-TH", { maximumFractionDigits: digits });
    }

    function calcDutyFtb(duty) {
      if (!duty.isFtbCounted) return 0;
      const std = Number(state.settings.standardHours || 1760);
      const percent = Number(duty.responsibilityPercent || 100) / 100;
      const volume = Number(duty.volume || 0);
      const hoursPerUnit = Number(duty.hoursPerUnit || 0);
      const frequency = Number(duty.frequency || 0);
      if (volume > 0 && hoursPerUnit > 0 && frequency > 0) {
        const ftb = (volume * hoursPerUnit * frequency * Number(duty.dutyWeight || 1) * Number(duty.roleWeight || 1) * percent) / std;
        return Number.isFinite(ftb) ? ftb : 0;
      }
      const activeMonthCount = Number(duty.sourceActiveMonthCount || (duty.months || []).length || 0);
      if (activeMonthCount > 0) {
        const ftb = (activeMonthCount / 12) * Number(duty.dutyWeight || 1) * Number(duty.roleWeight || 1) * percent;
        return Number.isFinite(ftb) ? ftb : 0;
      }
      const ftb = 0;
      return Number.isFinite(ftb) ? ftb : 0;
    }

    function availableFtb(person) {
      return Number(person.fteRatio || 0);
    }

    function accessibleOrgIds() {
      if (state.settings.role === "admin" || state.settings.role === "hr" || state.settings.orgScope === "all") {
        return state.orgs.map(o => o.id);
      }
      const root = state.settings.orgScope;
      const ids = new Set([root]);
      let changed = true;
      while (changed) {
        changed = false;
        state.orgs.forEach(o => {
          if (ids.has(o.parentId) && !ids.has(o.id)) {
            ids.add(o.id);
            changed = true;
          }
        });
      }
      return [...ids];
    }

    function scopedDuties() {
      const ids = new Set(accessibleOrgIds());
      return state.duties.filter(d => ids.has(d.orgId));
    }

    function canEdit(recordOrgId) {
      if (state.settings.role === "viewer") return false;
      if (["admin", "hr"].includes(state.settings.role)) return true;
      return accessibleOrgIds().includes(recordOrgId);
    }

    function statusBadge(status) {
      const map = {
        draft: ["ร่าง", ""],
        review: ["รอตรวจสอบ", "blue"],
        approved: ["อนุมัติ", "ok"],
        active: ["ใช้งาน", "ok"],
        locked: ["ล็อก", "warn"],
        returned: ["ส่งกลับ", "danger"]
      };
      const [text, cls] = map[status] || [status || "-", ""];
      return `<span class="badge ${cls}">${text}</span>`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m]));
    }

    function options(items, selected, placeholder = "เลือก") {
      return `<option value="">${placeholder}</option>` + items.map(([id, label]) => `<option value="${escapeHtml(id)}" ${id === selected ? "selected" : ""}>${escapeHtml(label)}</option>`).join("");
    }

    function orgOptions(selected, includeAll = false) {
      const rows = state.orgs.map(o => [o.id, o.name]);
      return (includeAll ? `<option value="all" ${selected === "all" ? "selected" : ""}>ทุกหน่วยงาน</option>` : "") + options(rows, selected, "เลือกหน่วยงาน");
    }

    function personOptions(selected) {
      return options(state.persons.map(p => [p.id, `${p.name} (${positionName(p.positionId)})`]), selected, "เลือกบุคลากร");
    }

    function positionOptions(selected) {
      return options(state.positions.map(p => [p.id, `${p.name} - ${orgName(p.orgId)}`]), selected, "เลือกตำแหน่ง");
    }

    function renderShell() {
      document.getElementById("nav").innerHTML = tabs.map(([id, icon, label]) =>
        `<button class="${currentTab === id ? "active" : ""}" onclick="switchTab('${id}')"><span>${icon}</span><span>${label}</span></button>`
      ).join("");

      document.getElementById("roleSelect").innerHTML = roles.map(([id, label]) =>
        `<option value="${id}" ${state.settings.role === id ? "selected" : ""}>${label}</option>`
      ).join("");
      document.getElementById("scopeSelect").innerHTML = orgOptions(state.settings.orgScope, true);
      const tab = tabs.find(([id]) => id === currentTab) || tabs[0];
      document.getElementById("pageTitle").textContent = tab[2];
      document.getElementById("pageSubtitle").textContent = tab[3];
    }

    function switchTab(tab) {
      currentTab = tab;
      editing = { org: null, position: null, person: null, duty: null };
      render();
    }

    function render() {
      renderShell();
      const map = {
        dashboard: renderDashboard,
        workloads: renderWorkloads,
        orgs: renderOrgs,
        positions: renderPositions,
        persons: renderPersons,
        chart: renderChart,
        reports: renderReports,
        audit: renderAudit
      };
      document.getElementById("view").innerHTML = (map[currentTab] || renderDashboard)();
      wireCurrentView();
    }

    function renderDashboard() {
      const duties = scopedDuties();
      const personIds = new Set(state.persons.filter(p => accessibleOrgIds().includes(p.orgId)).map(p => p.id));
      const positions = state.positions.filter(p => accessibleOrgIds().includes(p.orgId));
      const totalFtb = duties.reduce((sum, d) => sum + calcDutyFtb(d), 0);
      const available = state.persons.filter(p => personIds.has(p.id)).reduce((sum, p) => sum + availableFtb(p), 0);
      const utilization = available ? totalFtb / available : 0;
      const unowned = duties.filter(d => !d.ownerPersonId).length;
      const missingMonths = duties.filter(d => !d.months || d.months.length === 0).length;
      const overloaded = personUtilization().filter(p => p.utilization > 1.2);
      const missingFtbInputs = duties.filter(d => !(Number(d.volume || 0) > 0 && Number(d.hoursPerUnit || 0) > 0 && Number(d.frequency || 0) > 0)).length;
      return `
        <div class="toolbar">
          <div class="field"><label>ปีการศึกษา</label><input id="settingYear" value="${escapeHtml(state.settings.academicYear)}"></div>
          <div class="field"><label>ชั่วโมงมาตรฐานต่อ FTB</label><input id="settingStd" type="number" min="1" value="${escapeHtml(state.settings.standardHours)}"></div>
          <div class="field"><label>ค้นหาภาระงาน</label><input id="dashboardSearch" placeholder="ชื่อภาระงาน หน่วยงาน หรือผู้รับผิดชอบ"></div>
          <div class="actions span-2">
            <button class="primary" onclick="saveSettings()">บันทึกค่า</button>
            <button onclick="exportDutiesCsv()">ส่งออก CSV</button>
            <button onclick="downloadSnapshot()">Snapshot JSON</button>
          </div>
        </div>

        ${state.sourceMetadata ? `<div class="notice">ใช้ข้อมูลจริงจาก ${escapeHtml(state.sourceMetadata.sourceFile)} (${escapeHtml(state.sourceMetadata.generatedAt || "-")}) รวม ${duties.length} JD, ${state.persons.length} บุคลากร, ${state.orgs.length} หน่วยงาน; รายการที่ยังไม่มี volume/frequency/hours ${missingFtbInputs} รายการจะแสดง FTB ประมาณจากจำนวนเดือนที่ดำเนินการจริง</div>` : ""}

        <div class="kpis">
          <div class="kpi"><span>หน่วยงานในขอบเขต</span><strong>${accessibleOrgIds().length}</strong><small>${state.orgs.length} หน่วยงานทั้งหมด</small></div>
          <div class="kpi"><span>ตำแหน่ง / บุคลากร</span><strong>${positions.length} / ${personIds.size}</strong><small>อ้างอิงโครงสร้างปัจจุบัน</small></div>
          <div class="kpi"><span>ภาระงาน / FTB รวม</span><strong>${duties.length} / ${formatNumber(totalFtb)}</strong><small>สูตรชั่วโมงหรือ proxy จาก active month</small></div>
          <div class="kpi"><span>Utilization</span><strong>${formatNumber(utilization * 100, 1)}%</strong><small>Available FTB ${formatNumber(available)}</small></div>
          <div class="kpi"><span>หน่วยงานเกินกำลัง</span><strong>${orgUtilization().filter(o => o.utilization > 1.2).length}</strong><small>มากกว่า 120%</small></div>
          <div class="kpi"><span>คนที่ utilization สูง</span><strong>${overloaded.length}</strong><small>มากกว่า 120%</small></div>
          <div class="kpi"><span>งานไม่มีเจ้าภาพ</span><strong>${unowned}</strong><small>ต้องกำหนดผู้รับผิดชอบหลัก</small></div>
          <div class="kpi"><span>งานยังไม่ผูกเดือน</span><strong>${missingMonths}</strong><small>ต้องเลือก ส.ค.-ก.ค.</small></div>
        </div>

        <div class="grid cols-2">
          <section class="panel">
            <div class="panel-head"><h3>FTB รายหน่วยงาน</h3><span class="badge blue">${formatNumber(totalFtb)} FTB</span></div>
            <div class="panel-body">${renderOrgBars()}</div>
          </section>
          <section class="panel">
            <div class="panel-head"><h3>Utilization รายบุคคล</h3><span class="badge warn">เฝ้าระวัง > 120%</span></div>
            <div class="panel-body">${renderPersonTable(personUtilization().slice(0, 6))}</div>
          </section>
        </div>

        <section class="panel">
          <div class="panel-head"><h3>Heatmap ภาระงานรายเดือน ส.ค.-ก.ค.</h3><span class="badge">${state.settings.academicYear}</span></div>
          <div class="panel-body">${renderHeatmap()}</div>
        </section>
      `;
    }

    function saveSettings() {
      const old = { ...state.settings };
      state.settings.academicYear = document.getElementById("settingYear").value.trim() || state.settings.academicYear;
      state.settings.standardHours = Number(document.getElementById("settingStd").value || 1760);
      logChange("settings", "global", "update", old, state.settings, "บันทึกค่าระบบ");
      saveState();
      render();
    }

    function orgUtilization() {
      return state.orgs.map(org => {
        const orgIds = new Set([org.id, ...descendantOrgIds(org.id)]);
        const duties = state.duties.filter(d => orgIds.has(d.orgId));
        const ftb = duties.reduce((sum, d) => sum + calcDutyFtb(d), 0);
        const persons = state.persons.filter(p => orgIds.has(p.orgId));
        const available = persons.reduce((sum, p) => sum + availableFtb(p), 0);
        return { org, ftb, available, utilization: available ? ftb / available : 0 };
      }).filter(row => accessibleOrgIds().includes(row.org.id));
    }

    function personUtilization() {
      return state.persons
        .filter(p => accessibleOrgIds().includes(p.orgId))
        .map(person => {
          const ftb = personAssignedFtb(person.id);
          const available = availableFtb(person);
          return { person, ftb, available, utilization: available ? ftb / available : 0 };
        })
        .sort((a, b) => b.utilization - a.utilization);
    }

    function personAssignedFtb(personId) {
      const responsibilities = state.responsibilities || [];
      return state.duties.reduce((sum, duty) => {
        const dutyResponsibilities = responsibilities.filter(r => r.dutyId === duty.id);
        const personResponsibilities = dutyResponsibilities.filter(r => r.personId === personId);
        if (!personResponsibilities.length) {
          return duty.ownerPersonId === personId ? sum + calcDutyFtb(duty) : sum;
        }
        const ownerCount = Math.max(1, dutyResponsibilities.filter(r => r.roleType === "Owner").length);
        const dutyFtb = calcDutyFtb(duty);
        const assigned = personResponsibilities.reduce((subtotal, responsibility) => {
          const percent = responsibility.responsibilityPercent == null
            ? (responsibility.roleType === "Owner" ? 1 / ownerCount : 1)
            : Number(responsibility.responsibilityPercent || 0) / 100;
          return subtotal + dutyFtb * Number(responsibility.roleWeight || 1) * percent;
        }, 0);
        return sum + assigned;
      }, 0);
    }

    function descendantOrgIds(orgId) {
      const ids = [];
      let changed = true;
      while (changed) {
        changed = false;
        state.orgs.forEach(o => {
          if ((o.parentId === orgId || ids.includes(o.parentId)) && !ids.includes(o.id)) {
            ids.push(o.id);
            changed = true;
          }
        });
      }
      return ids;
    }

    function renderOrgBars() {
      const rows = orgUtilization().sort((a, b) => b.ftb - a.ftb);
      const max = Math.max(...rows.map(r => r.ftb), .1);
      if (!rows.length) return `<div class="empty">ยังไม่มีข้อมูลหน่วยงาน</div>`;
      return `<div class="bars">${rows.map(r => `
        <div class="bar-row">
          <strong>${escapeHtml(r.org.name)}</strong>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100, r.ftb / max * 100)}%"></div></div>
          <span>${formatNumber(r.ftb)}</span>
        </div>
      `).join("")}</div>`;
    }

    function renderPersonTable(rows) {
      if (!rows.length) return `<div class="empty">ยังไม่มีข้อมูลบุคลากร</div>`;
      return `<div class="table-wrap"><table>
        <thead><tr><th>บุคลากร</th><th>หน่วยงาน</th><th>FTB</th><th>Available</th><th>Utilization</th></tr></thead>
        <tbody>${rows.map(r => `
          <tr>
            <td>${escapeHtml(r.person.name)}</td>
            <td>${escapeHtml(orgName(r.person.orgId))}</td>
            <td>${formatNumber(r.ftb)}</td>
            <td>${formatNumber(r.available)}</td>
            <td>${utilBadge(r.utilization)}</td>
          </tr>
        `).join("")}</tbody>
      </table></div>`;
    }

    function utilBadge(value) {
      const cls = value > 1.5 ? "danger" : value > 1.2 ? "warn" : value >= .7 ? "ok" : "blue";
      return `<span class="badge ${cls}">${formatNumber(value * 100, 1)}%</span>`;
    }

    function renderHeatmap() {
      const rows = orgUtilization();
      const header = `<div class="heat-head">หน่วยงาน</div>` + MONTHS.map(([, label]) => `<div class="heat-head">${label}</div>`).join("");
      const body = rows.map(({ org }) => {
        const orgIds = new Set([org.id, ...descendantOrgIds(org.id)]);
        return `<div class="heat-label">${escapeHtml(org.name)}</div>` + MONTHS.map(([key]) => {
          const ftb = state.duties.filter(d => orgIds.has(d.orgId) && d.months.includes(key)).reduce((sum, d) => sum + calcDutyFtb(d), 0);
          const level = ftb > .45 ? 4 : ftb > .25 ? 3 : ftb > .1 ? 2 : ftb > 0 ? 1 : 0;
          return `<div class="heat-cell" data-level="${level}">${ftb ? formatNumber(ftb) : "-"}</div>`;
        }).join("");
      }).join("");
      return `<div class="heatmap">${header}${body}</div>`;
    }

    function renderOrgs() {
      const row = editing.org ? state.orgs.find(o => o.id === editing.org) : {};
      return `
        <div class="grid cols-2">
          <section class="panel">
            <div class="panel-head"><h3>${editing.org ? "แก้ไขหน่วยงาน" : "เพิ่มหน่วยงาน"}</h3><button onclick="clearEdit('org')">ล้างฟอร์ม</button></div>
            <div class="panel-body">
              <form id="orgForm" class="form-grid">
                <input type="hidden" name="id" value="${escapeHtml(row?.id || "")}">
                <div class="field"><label>ชื่อหน่วยงาน</label><input name="name" required value="${escapeHtml(row?.name || "")}"></div>
                <div class="field"><label>ประเภท</label><input name="type" value="${escapeHtml(row?.type || "")}" placeholder="คณะ สำนัก ศูนย์ ฝ่าย งาน"></div>
                <div class="field"><label>หน่วยงานแม่</label><select name="parentId">${orgOptions(row?.parentId || "")}</select></div>
                <div class="field"><label>ผู้บริหารกำกับดูแล</label><select name="managerPersonId">${personOptions(row?.managerPersonId || "")}</select></div>
                <div class="field"><label>สถานะ</label><select name="active"><option value="true" ${row?.active !== false ? "selected" : ""}>ใช้งาน</option><option value="false" ${row?.active === false ? "selected" : ""}>ปิดใช้งาน</option></select></div>
                <div class="span-2 status-line"><button class="primary" type="submit">บันทึกหน่วยงาน</button></div>
              </form>
            </div>
          </section>
          <section class="panel">
            <div class="panel-head"><h3>รายการหน่วยงาน</h3><span class="badge">${state.orgs.length} รายการ</span></div>
            <div class="panel-body">${renderOrgTable()}</div>
          </section>
        </div>`;
    }

    function renderOrgTable() {
      return `<div class="table-wrap"><table>
        <thead><tr><th>หน่วยงาน</th><th>ประเภท</th><th>หน่วยงานแม่</th><th>ผู้บริหาร</th><th>สถานะ</th><th></th></tr></thead>
        <tbody>${state.orgs.map(o => `
          <tr>
            <td>${escapeHtml(o.name)}</td>

    function renderOrgTree(parentId = "") {
      const children = state.orgs.filter(o => (o.parentId || "") === parentId);
      if (!children.length) return parentId ? "" : `<div class="empty">ยังไม่มีโครงสร้างหน่วยงาน</div>`;
      return `<ul>${children.map(org => {
        const duties = state.duties.filter(d => d.orgId === org.id);
        const ftb = duties.reduce((sum, d) => sum + calcDutyFtb(d), 0);
        const collapsed = collapsedOrgs.has(org.id);
        return `<li>
          <div class="node ${selectedOrgId === org.id ? "selected" : ""}" onclick="selectOrg('${org.id}')">
            <strong>${escapeHtml(org.name)}</strong>
            <small>${escapeHtml(org.type || "-")} · ${duties.length} JD · ${formatNumber(ftb)} FTB</small>
            <div class="row-actions">
              <button type="button" onclick="event.stopPropagation(); toggleCollapse('${org.id}')">${collapsed ? "ขยาย" : "ย่อ"}</button>
            </div>
          </div>
          ${collapsed ? "" : renderOrgTree(org.id)}
        </li>`;
      }).join("")}</ul>`;
    }

    function renderOrgDrawer(org) {
      if (!org) return `<div class="empty">เลือก node เพื่อดูรายละเอียด</div>`;
      const orgIds = new Set([org.id, ...descendantOrgIds(org.id)]);
      const duties = state.duties.filter(d => orgIds.has(d.orgId));
      const persons = state.persons.filter(p => orgIds.has(p.orgId));
      const ftb = duties.reduce((sum, d) => sum + calcDutyFtb(d), 0);
      const available = persons.reduce((sum, p) => sum + availableFtb(p), 0);
      return `
        <div>
          <h3 style="margin:0 0 6px">${escapeHtml(org.name)}</h3>
          <div class="status-line">
            <span class="badge">${escapeHtml(org.type || "-")}</span>
            <span class="badge ${org.active ? "ok" : "warn"}">${org.active ? "ใช้งาน" : "ปิดใช้งาน"}</span>

    function wireCurrentView() {
      const role = document.getElementById("roleSelect");
      const scope = document.getElementById("scopeSelect");
      role.onchange = () => {
        const old = { ...state.settings };
        state.settings.role = role.value;
        logChange("settings", "role", "switch-role", old, state.settings, "เปลี่ยนบทบาทในต้นแบบ");
        saveState();
        render();
      };
      scope.onchange = () => {
        const old = { ...state.settings };
        state.settings.orgScope = scope.value;
        logChange("settings", "scope", "switch-scope", old, state.settings, "เปลี่ยนขอบเขตหน่วยงาน");
        saveState();
        render();
      };

      const orgForm = document.getElementById("orgForm");
      if (orgForm) orgForm.onsubmit = submitOrg;
      const positionForm = document.getElementById("positionForm");
      if (positionForm) positionForm.onsubmit = submitPosition;
      const personForm = document.getElementById("personForm");
      if (personForm) personForm.onsubmit = submitPerson;
      const dutyForm = document.getElementById("dutyForm");
      if (dutyForm) dutyForm.onsubmit = submitDuty;

      const workloadSearch = document.getElementById("workloadSearch");
      if (workloadSearch) {
        workloadSearch.oninput = () => {
          const q = workloadSearch.value.trim().toLowerCase();
          const rows = scopedDuties().filter(d => [d.title, d.category, orgName(d.orgId), personName(d.ownerPersonId)].join(" ").toLowerCase().includes(q));
          document.getElementById("workloadList").innerHTML = renderDutyTable(rows);
        };
      }
    }

    function formData(form) {
      return Object.fromEntries(new FormData(form).entries());
    }

    function submitOrg(event) {
      event.preventDefault();
      const data = formData(event.target);
      const item = { id: data.id || uid("org"), name: data.name.trim(), type: data.type.trim(), parentId: data.parentId, managerPersonId: data.managerPersonId, active: data.active === "true" };
      if (item.parentId === item.id) return alert("หน่วยงานแม่ต้องไม่เป็นหน่วยงานเดียวกัน");
      upsert("orgs", item, "บันทึกหน่วยงาน");
      editing.org = null;
      render();
    }

    function submitPosition(event) {
      event.preventDefault();
      const data = formData(event.target);
      const item = { id: data.id || uid("pos"), name: data.name.trim(), orgId: data.orgId, level: data.level.trim(), type: data.type.trim(), supervisorPositionId: data.supervisorPositionId, active: data.active === "true" };
      if (!canEdit(item.orgId)) return alert("บทบาทนี้ไม่มีสิทธิ์แก้ไขหน่วยงานที่เลือก");
      upsert("positions", item, "บันทึกตำแหน่ง");
      editing.position = null;
      render();
    }

    function submitPerson(event) {
      event.preventDefault();
      const data = formData(event.target);
      const item = { id: data.id || uid("p"), code: data.code.trim(), name: data.name.trim(), email: data.email.trim(), orgId: data.orgId, positionId: data.positionId, fteRatio: Number(data.fteRatio || 1), status: data.status };
      if (!canEdit(item.orgId)) return alert("บทบาทนี้ไม่มีสิทธิ์แก้ไขหน่วยงานที่เลือก");
      upsert("persons", item, "บันทึกบุคลากร");
      editing.person = null;
      render();
    }

    function submitDuty(event) {
      event.preventDefault();
      const form = event.target;
      const data = formData(form);
      const months = [...form.querySelectorAll('input[name="months"]:checked')].map(x => x.value);
      if (!months.length) return alert("กรุณาเลือกเดือนดำเนินการอย่างน้อย 1 เดือน");
      if (!data.ownerPersonId) return alert("กรุณากำหนดผู้รับผิดชอบหลัก");
      if (!canEdit(data.orgId)) return alert("บทบาทนี้ไม่มีสิทธิ์แก้ไขหน่วยงานที่เลือก");
      const old = state.duties.find(d => d.id === data.id);
      if (old && ["approved", "locked"].includes(old.status) && !["admin", "hr"].includes(state.settings.role)) {
        return alert("ข้อมูลที่อนุมัติหรือล็อกแล้วต้องให้ HR/Admin แก้ไขพร้อมเหตุผล");
      }
      const item = {
        id: data.id || uid("d"),
        academicYear: data.academicYear.trim(),
        orgId: data.orgId,
        category: data.category.trim(),
        subcategory: data.subcategory.trim(),
        title: data.title.trim(),
        detail: data.detail.trim(),
        deliverable: data.deliverable.trim(),
        references: data.references.trim(),
        frequency: Number(data.frequency || 0),
        volume: Number(data.volume || 0),
        hoursPerUnit: Number(data.hoursPerUnit || 0),
        dutyWeight: Number(data.dutyWeight || 1),
        roleWeight: Number(data.roleWeight || 1),
        responsibilityPercent: Number(data.responsibilityPercent || 0),
        ownerPersonId: data.ownerPersonId,
        ownerPositionId: data.ownerPositionId,
        supervisorPersonId: data.supervisorPersonId,
        approverPersonId: data.approverPersonId,
        months,
        status: data.status,
        isFtbCounted: data.isFtbCounted === "true",
        attachmentsNote: data.attachmentsNote || "",
        createdAt: old?.createdAt || nowIso(),
        updatedAt: nowIso()
      };
      upsert("duties", item, data.reason || "บันทึก JD & Workload");
      editing.duty = null;
      render();
    }

    function upsert(collection, item, reason) {
      const idx = state[collection].findIndex(x => x.id === item.id);
      if (idx >= 0) {
        const old = state[collection][idx];
        state[collection][idx] = item;
        logChange(collection, item.id, "update", old, item, reason);
      } else {
        state[collection].push(item);
        logChange(collection, item.id, "create", "", item, reason);
      }
      saveState();
    }

    function editRecord(type, id) {
      editing[type] = id;
      window.scrollTo({ top: 0, behavior: "smooth" });
      render();
    }

    function clearEdit(type) {
      editing[type] = null;
      render();
    }

    function removeRecord(collection, id) {
      if (state.settings.role === "viewer") return alert("Viewer ไม่มีสิทธิ์ลบข้อมูล");
      const item = state[collection].find(x => x.id === id);
      if (!item) return;
      if (item.orgId && !canEdit(item.orgId)) return alert("บทบาทนี้ไม่มีสิทธิ์ลบข้อมูลในหน่วยงานนี้");
      const label = item.name || item.title || id;
      if (!confirm(`ยืนยันลบ "${label}"?`)) return;
      state[collection] = state[collection].filter(x => x.id !== id);
      logChange(collection, id, "delete", item, "", "ลบข้อมูล");
      saveState();
      render();
    }

    function setDutyStatus(status) {
      const duty = state.duties.find(d => d.id === editing.duty);
      if (!duty) return;
      if (["approved", "locked"].includes(status) && !["admin", "hr"].includes(state.settings.role)) {
        return alert("เฉพาะ HR/Admin เท่านั้นที่อนุมัติหรือล็อกข้อมูลได้");
      }
      const old = { ...duty };
      duty.status = status;
      duty.updatedAt = nowIso();
      logChange("duties", duty.id, "status", old, duty, `เปลี่ยนสถานะเป็น ${statusText(status)}`);
      saveState();
      render();
    }

    function toggleCollapse(id) {
      if (collapsedOrgs.has(id)) collapsedOrgs.delete(id);
      else collapsedOrgs.add(id);
      render();
    }

    function collapseAll() {
      collapsedOrgs = new Set(state.orgs.map(o => o.id));
      render();
    }

    function selectOrg(id) {
      selectedOrgId = id;
      render();
    }

    function rowsToCsv(rows) {
      return rows.map(row => row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
    }

    function download(filename, content, type = "text/plain;charset=utf-8") {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportDutiesCsv() {
      const rows = [["id","academic_year","org","title","owner","months","ftb","status"], ...scopedDuties().map(d => [d.id, d.academicYear, orgName(d.orgId), d.title, personName(d.ownerPersonId), d.months.join("|"), calcDutyFtb(d), d.status])];
      download("spu-workloads.csv", "\ufeff" + rowsToCsv(rows), "text/csv;charset=utf-8");
    }

    function exportPeopleCsv() {
      const rows = [["person","org","position","ftb","available_ftb","utilization"], ...personUtilization().map(r => [r.person.name, orgName(r.person.orgId), positionName(r.person.positionId), r.ftb, r.available, r.utilization])];
      download("spu-person-ftb.csv", "\ufeff" + rowsToCsv(rows), "text/csv;charset=utf-8");
    }

    function exportOrgCsv() {
      const rows = [["org","ftb","available_ftb","utilization"], ...orgUtilization().map(r => [r.org.name, r.ftb, r.available, r.utilization])];
      download("spu-org-ftb.csv", "\ufeff" + rowsToCsv(rows), "text/csv;charset=utf-8");
    }

    function exportAuditCsv() {
      const rows = [["time","table","record","action","changed_by","reason","new_value"], ...state.auditLogs.map(l => [l.changedAt, l.tableName, l.recordId, l.actionType, l.changedBy, l.reason, l.newValue])];
      download("spu-audit-log.csv", "\ufeff" + rowsToCsv(rows), "text/csv;charset=utf-8");
    }

    function downloadSnapshot() {
      const snapshot = {
        snapshotDate: nowIso(),
        academicYear: state.settings.academicYear,
        standardHours: state.settings.standardHours,
        summary: {
          totalAnnualFtb: scopedDuties().reduce((sum, d) => sum + calcDutyFtb(d), 0),
          totalAvailableFtb: state.persons.filter(p => accessibleOrgIds().includes(p.orgId)).reduce((sum, p) => sum + availableFtb(p), 0)
        },
        orgs: orgUtilization(),
        persons: personUtilization(),
        duties: scopedDuties()
      };
      download("spu-ftb-snapshot.json", JSON.stringify(snapshot, null, 2), "application/json;charset=utf-8");
    }

    function resetDemoData() {
      if (!confirm("รีเซ็ตข้อมูลทั้งหมดกลับเป็น seed data?")) return;
      state = structuredClone(seed);
      saveState();
      render();
    }

    render();
  </script>
</body>
</html>
